<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneSurfer Mandarin 🌊</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Serif+SC:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

    <style>
        :root {
            --bg-color: #f0f7f4; 
            --primary-color: #4ba38d; 
            --accent-pink: #ff9b9b; 
            --accent-yellow: #ffd24d;
            --text-dark: #2c3e35; 
            --card-bg: #ffffff;
            --success-color: #a8e6cf;
            --fail-color: #ffaaa6;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        .container {
            max-width: 780px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 3rem;
            color: var(--primary-color);
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 0px white;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            font-weight: 500;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .video-viewport {
            position: relative;
            width: 480px;
            height: 360px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 16px 32px rgba(44, 62, 53, 0.15);
            border: 8px solid white;
            background: #e2ede8;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 360px;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 360px;
            z-index: 2;
            pointer-events: none; 
        }

        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 240px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.02);
            border: 3px solid #eef3f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        #prompt-card {
            min-height: 180px;
        }

        .card-label {
            margin: 0; 
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem; 
            color: #7a9287;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chinese-char {
            font-family: 'Noto Serif SC', serif;
            font-size: 5rem;
            margin: 5px 0;
            font-weight: 700;
            color: #1a2c24;
        }

        .pinyin {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary-color);
            font-weight: 600;
        }

        .meaning {
            font-size: 1.1rem;
            margin: 5px 0 0 0;
            font-weight: 700;
            color: #61776c;
        }

        #status-card {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3rem;
            min-height: 70px;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
        }

        .controls-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        select {
            padding: 12px 24px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            border: 3px solid var(--primary-color);
            background: white;
            color: var(--text-dark);
            outline: none;
            width: 320px;
            cursor: pointer;
            box-shadow: 0 4px 0px rgba(0,0,0,0.05);
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #377d6c;
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #377d6c;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ToneSurfer Mandarin 🌊</h1>
        <p class="subtitle">Ride the magic wave with your finger to learn tones!</p>

        <div class="game-layout">
            <div class="video-viewport">
                <video id="webcam" autoplay playsinline muted width="480" height="360"></video>
                <canvas id="game-canvas" width="480" height="360"></canvas>
            </div>

            <div class="sidebar-panel">
                <div id="prompt-card" class="card">
                    <p id="level-indicator" class="card-label">Level 1 of 4</p>
                    <p id="ui-char" class="chinese-char">-</p>
                    <p id="ui-pinyin" class="pinyin">-</p>
                    <p id="ui-meaning" class="meaning">-</p>
                </div>

                <div id="status-card" class="card">
                    Waking up the camera magic... 🔌🎥
                </div>
            </div>
        </div>

        <div class="controls-row">
            <select id="camera-selector">
                <option value="">Looking for cameras...</option>
            </select>
            
            <button id="start-btn" class="btn">Start Surfing! 🏄‍♂️</button>
            <button id="next-btn" class="btn hidden">Next Level! 🎉</button>
        </div>
    </div>

    <script>
        const wordList = [
            { char: "妈", pinyin: "mā", meaning: "Mother", tone: 1, baseFreq: 400 },
            { char: "麻", pinyin: "má", meaning: "Hemp", tone: 2, baseFreq: 260 },
            { char: "马", pinyin: "mǎ", meaning: "Horse", tone: 3, baseFreq: 350 },
            { char: "骂", pinyin: "mà", meaning: "Scold", tone: 4, baseFreq: 400 }
        ];

        let currentLevel = 0;
        let yHistory = [];
        let gameActive = false;
        let tracingActive = false;
        let countdownVal = 0;
        let zoneHistory = [];
        let currentStream = null;

        // Audio setup
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let audioInitialized = false;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const selector = document.getElementById('camera-selector');

        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const uiChar = document.getElementById('ui-char');
        const uiPinyin = document.getElementById('ui-pinyin');
        const uiMeaning = document.getElementById('ui-meaning');
        const levelIndicator = document.getElementById('level-indicator');
        const statusCard = document.getElementById('status-card');

        // Initial setup sequence
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(initialStream => {
                initialStream.getTracks().forEach(track => track.stop());
                discoverCameras();
            })
            .catch(err => {
                statusCard.innerText = "❌ Uh oh! Camera blocked. Please turn it on in settings!";
            });

        function discoverCameras() {
            navigator.mediaDevices.enumerateDevices()
                .then(devices => {
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    selector.innerHTML = ''; 
                    
                    if (videoDevices.length === 0) {
                        statusCard.innerText = "No webcams found! Plug one in to surf.";
                        return;
                    }

                    videoDevices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Camera ${index + 1}`;
                        selector.appendChild(option);
                    });

                    startCamera(videoDevices[0].deviceId);
                });
        }

        function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: 480,
                    height: 360
                }
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    currentStream = stream;
                    video.srcObject = stream;
                    statusCard.innerText = "Camera ready! Loading AI hand magic... 🤖✨";
                    
                    video.onloadeddata = () => {
                        initML5();
                    };
                })
                .catch(err => {
                    statusCard.innerText = "Camera glitch: " + err.message;
                });
        }

        selector.addEventListener('change', (e) => {
            if (e.target.value) startCamera(e.target.value);
        });

        function initML5() {
            const handpose = ml5.handpose(video, () => {
                statusCard.innerText = "AI is Ready! Pick a camera below and click 'Start Surfing'! 🌊";
            });

            handpose.on('hand', results => {
                handleTracking(results);
            });
            
            requestAnimationFrame(renderLoop);
        }

        // KID-FRIENDLY HUD RENDERING ENGINE
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                let currentTone = wordList[currentLevel].tone;

                // Translucent guide container block
                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.fillRect(80, 60, 320, 240);

                // Draw the tone shape outline helper
                ctx.strokeStyle = 'rgba(75, 163, 141, 0.85)';
                ctx.lineWidth = 10;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();

                if (currentTone === 1) {
                    // Tone 1: Flat high
                    ctx.moveTo(100, 120);
                    ctx.lineTo(380, 120);
                } else if (currentTone === 2) {
                    // Tone 2: Rising
                    ctx.moveTo(120, 260);
                    ctx.lineTo(360, 100);
                } else if (currentTone === 3) {
                    // Tone 3: Dipping
                    ctx.moveTo(100, 120);
                    ctx.quadraticCurveTo(240, 340, 380, 140);
                } else if (currentTone === 4) {
                    // Tone 4: Falling
                    ctx.moveTo(120, 100);
                    ctx.lineTo(360, 260);
                }
                ctx.stroke();

                // Simple Zone separator label (Subtle middle marker line)
                ctx.strokeStyle = 'rgba(0,0,0,0.06)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height/2);
                ctx.lineTo(canvas.width, canvas.height/2);
                ctx.stroke();
            }

            // Big, bold countdown overlay
            if (countdownVal > 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#4ba38d';
                ctx.font = 'bold 90px Fredoka, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(countdownVal, canvas.width / 2, canvas.height / 2);
            }

            requestAnimationFrame(renderLoop);
        }

        function handleTracking(hands) {
            if (hands.length > 0) {
                let hand = hands[0];
                let indexFinger = hand.landmarks[8];
                let x = indexFinger[0];
                let y = indexFinger[1];
                
                if (tracingActive) {
                    yHistory.push(y);
                }

                // Draw a beautiful sparkly indicator tracking dot
                ctx.save();
                ctx.fillStyle = '#ff9b9b';
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(canvas.width - x, y, 14, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
                ctx.restore();

                // Interactive Audio Theremin 
                let normalizedY = y / canvas.height;
                let calculatedFreq = 466 - (normalizedY * (466 - 220)); 
                setPitch(calculatedFreq);

                let currentZone = (y < canvas.height / 2) ? "Top" : "Bottom";
                if (zoneHistory.length === 0 || zoneHistory[zoneHistory.length - 1] !== currentZone) {
                    zoneHistory.push(currentZone);
                }
            }
        }

        function initAudio() {
            if (audioInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(330, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            audioInitialized = true;
        }

        function setPitch(frequency) {
            if (!audioInitialized) return;
            oscillator.frequency.linearRampToValueAtTime(frequency, audioCtx.currentTime + 0.05);
        }

        function setVolume(val) {
            if (!audioInitialized) return;
            gainNode.gain.linearRampToValueAtTime(val, audioCtx.currentTime + 0.05);
        }

        function loadLevel(index) {
            currentLevel = index;
            zoneHistory = [];
            yHistory = [];
            
            let word = wordList[currentLevel];

            levelIndicator.innerText = `Word ${currentLevel + 1} of ${wordList.length}`;
            uiChar.innerText = word.char;
            uiPinyin.innerText = word.pinyin;
            uiMeaning.innerText = word.meaning;
            
            nextBtn.classList.add('hidden');
            statusCard.style.backgroundColor = "#ffffff";
            
            playPromptCue(word.baseFreq, word.tone);
        }

        function playPromptCue(base, tone) {
            initAudio();
            setVolume(0.2);

            let now = audioCtx.currentTime;
            oscillator.frequency.cancelScheduledValues(now);

            if (tone === 1) { 
                oscillator.frequency.setValueAtTime(base, now);
                oscillator.frequency.setValueAtTime(base, now + 0.6);
            } else if (tone === 2) { 
                oscillator.frequency.setValueAtTime(base - 50, now);
                oscillator.frequency.exponentialRampToValueAtTime(base + 80, now + 0.6);
            } else if (tone === 3) { 
                oscillator.frequency.setValueAtTime(base, now);
                oscillator.frequency.exponentialRampToValueAtTime(base - 80, now + 0.25);
                oscillator.frequency.exponentialRampToValueAtTime(base + 60, now + 0.6);
            } else if (tone === 4) { 
                oscillator.frequency.setValueAtTime(base + 100, now);
                oscillator.frequency.exponentialRampToValueAtTime(base - 100, now + 0.5);
            }

            gainNode.gain.setValueAtTime(0.2, now + 0.5);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
            
            setTimeout(() => {
                statusCard.innerText = "Listen closely... 👂 Now get ready!";
                runTimerSequence(3);
            }, 900);
        }

        function runTimerSequence(seconds) {
            countdownVal = seconds;
            let timer = setInterval(() => {
                countdownVal--;
                if (countdownVal <= 0) {
                    clearInterval(timer);
                    startTracingWindow();
                }
            }, 1000);
        }

        function startTracingWindow() {
            tracingActive = true;
            setVolume(0.2); 
            statusCard.innerText = "SURF THE WAVE! 🏄‍♂️✨ Trace the green line!";
            statusCard.style.backgroundColor = "var(--accent-yellow)"; 

            setTimeout(() => {
                evaluateTracedResult();
            }, 2500);
        }

        function evaluateTracedResult() {
            tracingActive = false;
            setVolume(0); 

            let targetTone = wordList[currentLevel].tone;
            let detectedTone = 0;
            let pattern = zoneHistory.join("->");

            const FLAT_THRESHOLD = canvas.height * 0.20; 
            let isFlat = false;
            if (yHistory.length > 0) {
                const minY = Math.min(...yHistory);
                const maxY = Math.max(...yHistory);
                isFlat = (maxY - minY) < FLAT_THRESHOLD;
            }

            if (isFlat) {
                detectedTone = 1;
            } else if (pattern === "Bottom->Top") {
                detectedTone = 2;
            } else if (pattern === "Top->Bottom->Top") {
                detectedTone = 3;
            } else if (pattern === "Top->Bottom") {
                detectedTone = 4;
            }

            if (detectedTone === targetTone) {
                statusCard.innerText = "🌟 AWESOME! Perfect Wave! 🌟";
                statusCard.style.backgroundColor = "var(--success-color)"; 
                nextBtn.classList.remove('hidden');
            } else {
                statusCard.innerText = "Close! Let's try riding that wave again! 🌊";
                statusCard.style.backgroundColor = "var(--fail-color)"; 
                setTimeout(() => loadLevel(currentLevel), 2800); 
            }
        }

        startBtn.addEventListener('click', () => {
            gameActive = true;
            startBtn.classList.add('hidden');
            loadLevel(0);
        });

        nextBtn.addEventListener('click', () => {
            let nextIndex = (currentLevel + 1) % wordList.length;
            loadLevel(nextIndex);
        });

        // Debug triggers kept silent for smooth continuous play
        window.addEventListener('keydown', (e) => {
            if (!gameActive || !tracingActive) return;
            let key = e.key;
            if (key === '1') { zoneHistory = ["Top"]; evaluateTracedResult(); }
            if (key === '2') { zoneHistory = ["Bottom", "Top"]; evaluateTracedResult(); }
            if (key === '3') { zoneHistory = ["Top", "Bottom", "Top"]; evaluateTracedResult(); }
            if (key === '4') { zoneHistory = ["Top", "Bottom"]; evaluateTracedResult(); }
        });
    </script>
</body>
</html>
