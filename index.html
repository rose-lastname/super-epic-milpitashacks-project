<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToneSurfer Mandarin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>

  <style>
    :root {
      color-scheme: light;
      --sky-blue-light: #8ecae6ff;
      --blue-green: #219ebcff;
      --deep-space-blue: #023047ff;
      --amber-flame: #ffb703ff;
      --princeton-orange: #fb8500ff;
      --cream: #fff8e8;
      --butter: var(--amber-flame);
      --butter-soft: #ffe7a7;
      --sage: var(--sky-blue-light);
      --sage-deep: var(--blue-green);
      --peach: #ffc57f;
      --peach-deep: var(--princeton-orange);
      --terracotta: var(--princeton-orange);
      --sand: #f9e2bb;
      --rose: #ffcf9c;
      --ink: var(--deep-space-blue);
      --soft-ink: rgba(2, 48, 71, 0.64);
      --white: #ffffff;
      --shadow: rgba(2, 48, 71, 0.15);
      --shadow-soft: rgba(2, 48, 71, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Quicksand", "Nunito", ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 8% 18%, rgba(251, 133, 0, 0.16) 0 74px, transparent 75px),
        radial-gradient(circle at 90% 10%, rgba(255, 183, 3, 0.28) 0 88px, transparent 89px),
        radial-gradient(circle at 86% 88%, rgba(142, 202, 230, 0.34) 0 126px, transparent 127px),
        linear-gradient(145deg, #fff8e8 0%, #fff1d4 46%, #f8e5c3 100%);
      display: grid;
      place-items: center;
      padding: 28px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      left: -8vw;
      right: -8vw;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      bottom: 0;
      height: 23vh;
      background:
        radial-gradient(128px 36px at 7% 34%, rgba(142, 202, 230, 0.38) 0 62%, transparent 63%),
        radial-gradient(142px 42px at 27% 50%, rgba(251, 133, 0, 0.2) 0 62%, transparent 63%),
        radial-gradient(132px 40px at 48% 32%, rgba(255, 183, 3, 0.38) 0 62%, transparent 63%),
        radial-gradient(152px 43px at 72% 48%, rgba(33, 158, 188, 0.22) 0 62%, transparent 63%),
        radial-gradient(134px 38px at 94% 35%, rgba(251, 133, 0, 0.16) 0 62%, transparent 63%),
        linear-gradient(180deg, transparent 0%, rgba(247, 223, 186, 0.74) 100%);
    }

    body::after {
      top: 0;
      height: 100%;
      background-image:
        radial-gradient(circle, rgba(251, 133, 0, 0.16) 0 5px, transparent 6px),
        radial-gradient(circle, rgba(33, 158, 188, 0.18) 0 4px, transparent 5px),
        radial-gradient(circle, rgba(255, 183, 3, 0.34) 0 6px, transparent 7px);
      background-position: 9% 26%, 78% 50%, 51% 10%;
      background-size: 250px 280px, 330px 350px, 280px 300px;
      opacity: 0.72;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      gap: 20px;
      position: relative;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: stretch;
    }

    .title-card,
    .camera-shell,
    .tone-card,
    .meter,
    .hint,
    .start-button,
    .tone-chip {
      border: 1px solid rgba(255, 255, 255, 0.84);
      border-radius: 32px;
      box-shadow: 0 22px 55px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .title-card {
      min-height: 132px;
      padding: 22px 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 251, 239, 0.58)),
        linear-gradient(135deg, var(--butter-soft), rgba(142, 202, 230, 0.58));
      display: grid;
      align-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .title-card::after {
      content: "";
      position: absolute;
      right: 28px;
      top: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255, 255, 255, 0.82) 0 8px, transparent 9px),
        linear-gradient(145deg, var(--amber-flame), var(--princeton-orange));
      box-shadow: 0 14px 24px rgba(251, 133, 0, 0.18);
      opacity: 0.9;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 5vw, 4.2rem);
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 1000;
    }

    .title-mark {
      color: var(--sage-deep);
    }

    .subtitle {
      margin: 0;
      color: var(--soft-ink);
      font-weight: 850;
      font-size: 1.05rem;
    }

    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .nav-pill,
    .tone-chip {
      align-items: center;
      display: inline-flex;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      color: var(--soft-ink);
      background: rgba(255, 255, 255, 0.56);
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 950;
    }

    .nav-icon,
    .chip-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
      position: relative;
      flex: 0 0 auto;
    }

    .nav-icon.home {
      background: var(--sage);
    }

    .nav-icon.home::before {
      content: "";
      position: absolute;
      inset: 5px 4px 4px;
      border-radius: 5px;
      background: var(--white);
    }

    .nav-icon.spark {
      background: var(--butter);
    }

    .nav-icon.spark::before,
    .nav-icon.spark::after,
    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      background: var(--white);
      border-radius: 999px;
    }

    .nav-icon.spark::before {
      width: 12px;
      height: 4px;
      left: 4px;
      top: 8px;
    }

    .nav-icon.spark::after {
      width: 4px;
      height: 12px;
      left: 8px;
      top: 4px;
    }

    .start-button {
      align-items: center;
      align-self: stretch;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), transparent 52%),
        linear-gradient(135deg, var(--peach), var(--butter));
      color: var(--deep-space-blue);
      display: flex;
      gap: 10px;
      justify-content: center;
      min-height: 104px;
      min-width: 188px;
      padding: 0 26px;
      font: inherit;
      font-size: 1.08rem;
      font-weight: 1000;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .start-button::before {
      content: "";
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent 0 43%, var(--white) 44% 56%, transparent 57%),
        linear-gradient(0deg, transparent 0 43%, var(--white) 44% 56%, transparent 57%),
        var(--sage-deep);
      box-shadow: inset 0 -4px 0 rgba(74, 74, 63, 0.08);
    }

    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 28px 60px rgba(251, 133, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .start-button:active {
      transform: translateY(2px);
    }

    .start-button:disabled {
      cursor: default;
      opacity: 0.82;
      transform: none;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 20px;
      align-items: stretch;
    }

    .camera-shell {
      position: relative;
      overflow: hidden;
      min-height: 500px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 52% 16%, rgba(255, 183, 3, 0.78) 0 74px, transparent 75px),
        linear-gradient(180deg, rgba(251, 133, 0, 0.22) 0%, rgba(255, 240, 201, 0.72) 48%, rgba(142, 202, 230, 0.48) 100%),
        var(--white);
    }

    .camera-shell::before {
      content: "Surf Cam";
      position: absolute;
      left: 24px;
      top: 22px;
      z-index: 4;
      padding: 11px 16px 11px 44px;
      border: 1px solid rgba(255, 255, 255, 0.84);
      border-radius: 999px;
      color: var(--deep-space-blue);
      background:
        radial-gradient(circle at 25px 50%, var(--sage-deep) 0 9px, transparent 10px),
        rgba(255, 255, 255, 0.68);
      font-size: 0.92rem;
      font-weight: 1000;
      box-shadow: 0 14px 28px var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    canvas {
      width: calc(100% - 42px);
      height: calc(100% - 42px);
      min-height: 456px;
      display: block;
      object-fit: cover;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.9) 0 8px, transparent 9px),
        linear-gradient(180deg, #ffc57f 0%, #fff0c9 47%, #8ecae6 100%);
      border-radius: 38px;
      box-shadow: inset 0 0 0 10px rgba(255, 251, 239, 0.42), 0 20px 50px rgba(136, 105, 73, 0.16);
    }

    video {
      display: none;
    }

    .zone-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: grid;
      grid-template-rows: 1fr 1fr;
      opacity: 0.98;
    }

    .zone {
      position: relative;
      border: 4px dashed transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 1000;
      letter-spacing: 0;
      color: var(--ink);
    }

    .zone span {
      max-width: min(86%, 360px);
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.84);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 14px 30px var(--shadow-soft);
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.22rem);
      backdrop-filter: blur(10px);
    }

    .zone-high {
      background: linear-gradient(180deg, rgba(255, 232, 173, 0.42), transparent 74%);
    }

    .zone-low {
      border-top-color: rgba(2, 48, 71, 0.22);
      background: linear-gradient(0deg, rgba(142, 202, 230, 0.45), transparent 74%);
    }

    .zone-overlay.high .zone-high {
      border-color: rgba(255, 183, 3, 0.72);
      background: rgba(255, 183, 3, 0.28);
    }

    .zone-overlay.low .zone-low {
      border-color: rgba(33, 158, 188, 0.64);
      background: rgba(142, 202, 230, 0.38);
    }

    .finger-dot {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 5px solid var(--white);
      background:
        radial-gradient(circle at 38% 33%, rgba(255, 255, 255, 0.95) 0 5px, transparent 6px),
        var(--terracotta);
      box-shadow: 0 0 0 9px rgba(251, 133, 0, 0.18), 0 10px 20px rgba(2, 48, 71, 0.18);
      translate: -50% -50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 5;
    }

    .finger-dot.visible {
      opacity: 1;
    }

    .status-panel {
      display: grid;
      gap: 14px;
      align-content: start;
      position: relative;
    }

    .tone-card {
      min-height: 214px;
      padding: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(255, 251, 239, 0.58)),
        linear-gradient(145deg, var(--white), var(--butter-soft));
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .status-label {
      margin: 0;
      color: var(--sage-deep);
      font-weight: 1000;
      font-size: 0.92rem;
    }

    .status-text {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .status-text.high {
      color: var(--terracotta);
    }

    .status-text.low {
      color: var(--sage-deep);
    }

    .status-text.neutral {
      color: var(--peach-deep);
    }

    .tone-chips {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .tone-chip {
      justify-content: center;
      min-height: 58px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 16px 34px var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.84);
    }

    .chip-icon.high {
      background: var(--peach);
    }

    .chip-icon.high::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 10px;
      width: 10px;
      height: 10px;
      border-left: 4px solid var(--white);
      border-top: 4px solid var(--white);
      transform: rotate(45deg);
    }

    .chip-icon.low {
      background: var(--sage);
    }

    .chip-icon.low::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      width: 10px;
      height: 10px;
      border-right: 4px solid var(--white);
      border-bottom: 4px solid var(--white);
      transform: rotate(45deg);
    }

    .readout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meter {
      min-height: 82px;
      background: rgba(255, 255, 255, 0.62);
      padding: 15px;
      color: var(--soft-ink);
      font-weight: 900;
    }

    .meter strong {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 1.42rem;
      font-weight: 1000;
    }

    .hint {
      margin: 0;
      padding: 16px;
      color: var(--ink);
      background: rgba(255, 232, 173, 0.52);
      font-size: 1.04rem;
      font-weight: 820;
      line-height: 1.42;
    }

    .mascot {
      position: absolute;
      right: 28px;
      bottom: 22px;
      z-index: 4;
      width: 92px;
      height: 84px;
      border-radius: 44px 44px 30px 30px;
      background: var(--sage);
      box-shadow: 0 18px 35px rgba(33, 158, 188, 0.22);
      pointer-events: none;
    }

    .mascot::before,
    .mascot::after {
      content: "";
      position: absolute;
      top: 24px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.42);
    }

    .mascot::before {
      left: 24px;
    }

    .mascot::after {
      right: 24px;
    }

    .mascot-smile {
      position: absolute;
      left: 34px;
      top: 48px;
      width: 24px;
      height: 13px;
      border-bottom: 4px solid rgba(2, 48, 71, 0.8);
      border-radius: 0 0 999px 999px;
    }

    .sparkle {
      position: absolute;
      z-index: 3;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 232, 173, 0.72);
      box-shadow: 0 12px 24px rgba(251, 133, 0, 0.12);
      pointer-events: none;
    }

    .sparkle.one {
      left: 8%;
      bottom: 18%;
    }

    .sparkle.two {
      right: 16%;
      top: 22%;
      transform: scale(0.78);
    }

    .sparkle::before {
      width: 16px;
      height: 4px;
      left: 6px;
      top: 12px;
    }

    .sparkle::after {
      width: 4px;
      height: 16px;
      left: 12px;
      top: 6px;
    }

    .celebrate {
      min-height: 36px;
      color: var(--princeton-orange);
      font-size: 1.16rem;
      font-weight: 1000;
    }

    .pulse {
      animation: pulse 520ms ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.045) rotate(-1deg); }
      100% { transform: scale(1); }
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      header,
      .stage-grid {
        grid-template-columns: 1fr;
      }

      .start-button {
        width: 100%;
      }

      .camera-shell,
      canvas {
        min-height: 54vh;
      }

      canvas {
        width: calc(100% - 26px);
        height: calc(100% - 26px);
      }

      .title-card::after {
        opacity: 0.38;
      }

      .mascot {
        opacity: 0.58;
        transform: scale(0.82);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <section class="title-card" aria-label="ToneSurfer Mandarin title">
        <div class="top-nav" aria-label="Practice overview">
          <span class="nav-pill"><span class="nav-icon home" aria-hidden="true"></span> Tone Studio</span>
          <span class="nav-pill"><span class="nav-icon spark" aria-hidden="true"></span> Level 1</span>
        </div>
        <h1><span class="title-mark">ToneSurfer</span> Mandarin</h1>
        <p class="subtitle">A playful beach game for practicing Mandarin tones</p>
      </section>
      <button id="startButton" class="start-button">Start Surf</button>
    </header>

    <section class="stage-grid" aria-label="ToneSurfer Mandarin game">
      <div class="camera-shell">
        <video id="video" playsinline muted></video>
        <canvas id="canvas" width="960" height="540"></canvas>
        <div id="zoneOverlay" class="zone-overlay" aria-hidden="true">
          <div class="zone zone-high"><span>Surf Up: High Tone</span></div>
          <div class="zone zone-low"><span>Dive Down: Low Tone</span></div>
        </div>
        <div id="fingerDot" class="finger-dot" aria-hidden="true"></div>
        <span class="sparkle one" aria-hidden="true"></span>
        <span class="sparkle two" aria-hidden="true"></span>
        <div class="mascot" aria-hidden="true"><span class="mascot-smile"></span></div>
      </div>

      <aside class="status-panel">
        <div id="toneCard" class="tone-card">
          <p class="status-label">Beach Mission</p>
          <p id="statusText" class="status-text neutral">Surf up for High Tone</p>
          <div id="celebrateText" class="celebrate"></div>
        </div>

        <div class="tone-chips" aria-label="Tone controls">
          <div class="tone-chip"><span class="chip-icon high" aria-hidden="true"></span> High Tone</div>
          <div class="tone-chip"><span class="chip-icon low" aria-hidden="true"></span> Low Tone</div>
        </div>

        <div class="readout">
          <div class="meter">
            Finger Spot
            <strong id="yReadout">--</strong>
          </div>
          <div class="meter">
            Pitch
            <strong id="pitchReadout">330Hz</strong>
          </div>
        </div>

        <p class="hint">Move one finger into the warm high zone for Ma and the sage low zone for Ma.</p>
      </aside>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const startButton = document.getElementById("startButton");
    const statusText = document.getElementById("statusText");
    const celebrateText = document.getElementById("celebrateText");
    const zoneOverlay = document.getElementById("zoneOverlay");
    const fingerDot = document.getElementById("fingerDot");
    const yReadout = document.getElementById("yReadout");
    const pitchReadout = document.getElementById("pitchReadout");
    const toneCard = document.getElementById("toneCard");

    let detector = null;
    let audioContext = null;
    let oscillator = null;
    let gainNode = null;
    let running = false;
    let cheatTone = null;
    let cheatTimer = null;

    const TONES = {
      high: {
        display: "High wave: Ma",
        pitch: 440,
        wave: "sawtooth",
        className: "high",
        celebration: "Beautiful lift"
      },
      low: {
        display: "Low wave: Ma",
        pitch: 220,
        wave: "sine",
        className: "low",
        celebration: "Soft landing"
      },
      neutral: {
        display: "Surf up for High Tone",
        pitch: 330,
        wave: "sine",
        className: "neutral",
        celebration: "Find your wave!"
      }
    };

    function setStatus(message) {
      statusText.textContent = message;
    }

    function resizeCanvasToVideo() {
      if (!video.videoWidth || !video.videoHeight) return;
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
    }

    async function setupWebcam() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 960 },
          height: { ideal: 540 },
          facingMode: "user"
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      resizeCanvasToVideo();
    }

    async function setupHandTracking() {
      await tf.setBackend("webgl");
      await tf.ready();

      detector = await handPoseDetection.createDetector(
        handPoseDetection.SupportedModels.MediaPipeHands,
        {
          runtime: "mediapipe",
          modelType: "lite",
          maxHands: 1,
          solutionPath: "https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4"
        }
      );
    }

    function setupAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContextClass();
      oscillator = audioContext.createOscillator();
      gainNode = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = 330;
      gainNode.gain.value = 0.12;
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start();
    }

    function drawCameraFrame() {
      resizeCanvasToVideo();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (video.readyState >= 2 && video.videoWidth && video.videoHeight) {
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
      } else {
        ctx.save();
        ctx.fillStyle = "#ffe7a7";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#8ecae6";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.5, canvas.height * 0.6, canvas.width * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#219ebc";
        ctx.font = "bold 34px Quicksand, Nunito, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Surf cam warming up", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      ctx.save();
      ctx.strokeStyle = "rgba(251, 133, 0, 0.42)";
      ctx.lineWidth = 5;
      ctx.setLineDash([18, 14]);
      ctx.beginPath();
      ctx.moveTo(0, canvas.height * 0.5);
      ctx.lineTo(canvas.width, canvas.height * 0.5);
      ctx.stroke();
      ctx.restore();
    }

    function toneFromY(normalizedY) {
      if (normalizedY < 0.3) return "high";
      if (normalizedY > 0.7) return "low";
      return "neutral";
    }

    function applyTone(toneName, normalizedY, forced) {
      const tone = TONES[toneName];

      statusText.textContent = forced ? `${tone.display} demo` : tone.display;
      statusText.className = `status-text ${tone.className}`;
      celebrateText.textContent = tone.celebration;
      zoneOverlay.className = `zone-overlay ${toneName}`;
      yReadout.textContent = typeof normalizedY === "number" ? normalizedY.toFixed(2) : "--";
      pitchReadout.textContent = `${tone.pitch}Hz`;

      if (oscillator && audioContext) {
        oscillator.type = tone.wave;
        oscillator.frequency.cancelScheduledValues(audioContext.currentTime);
        oscillator.frequency.setTargetAtTime(tone.pitch, audioContext.currentTime, 0.075);
      }

      if (toneName !== "neutral") {
        toneCard.classList.remove("pulse");
        void toneCard.offsetWidth;
        toneCard.classList.add("pulse");
      }
    }

    function placeFingerDot(indexTip) {
      const cameraBox = canvas.getBoundingClientRect();
      const shellBox = canvas.parentElement.getBoundingClientRect();

      const normalizedX = Math.min(1, Math.max(0, indexTip.x / video.videoWidth));
      const normalizedY = Math.min(1, Math.max(0, indexTip.y / video.videoHeight));

      const canvasX = canvas.width - (normalizedX * canvas.width);
      const canvasY = normalizedY * canvas.height;
      const screenX = (canvasX / canvas.width) * cameraBox.width + cameraBox.left - shellBox.left;
      const screenY = (canvasY / canvas.height) * cameraBox.height + cameraBox.top - shellBox.top;

      fingerDot.style.left = `${screenX}px`;
      fingerDot.style.top = `${screenY}px`;
      fingerDot.classList.add("visible");
    }

    function hideFingerDot() {
      fingerDot.classList.remove("visible");
    }

    async function detectLoop() {
      if (!running) return;

      drawCameraFrame();

      let detectedTone = "neutral";
      let normalizedY = null;

      if (detector && video.readyState >= 2) {
        try {
          const hands = await detector.estimateHands(video, { flipHorizontal: false });
          if (hands.length && hands[0].keypoints && hands[0].keypoints[8]) {
            const indexTip = hands[0].keypoints[8];
            normalizedY = Math.min(1, Math.max(0, indexTip.y / video.videoHeight));
            detectedTone = toneFromY(normalizedY);
            placeFingerDot(indexTip);
          } else {
            hideFingerDot();
          }
        } catch (error) {
          console.warn("Hand tracking skipped this frame:", error);
        }
      }

      if (cheatTone) {
        applyTone(cheatTone, cheatTone === "high" ? 0.12 : 0.88, true);
      } else {
        applyTone(detectedTone, normalizedY, false);
      }

      requestAnimationFrame(detectLoop);
    }

    function triggerCheat(toneName) {
      cheatTone = toneName;
      applyTone(toneName, toneName === "high" ? 0.12 : 0.88, true);
      clearTimeout(cheatTimer);
      cheatTimer = setTimeout(() => {
        cheatTone = null;
        if (!running) applyTone("neutral", null, false);
      }, 2500);
    }

    startButton.addEventListener("click", async () => {
      startButton.disabled = true;
      startButton.textContent = "Starting...";
      setStatus("Warming up Surf Cam");

      try {
        if (!audioContext) setupAudio();
        if (audioContext.state === "suspended") await audioContext.resume();

        await setupWebcam();
        await setupHandTracking();

        running = true;
        startButton.textContent = "Surfing Now";
        applyTone("neutral", null, false);
        detectLoop();
      } catch (error) {
        console.error(error);
        startButton.disabled = false;
        startButton.textContent = "Start Surf";
        statusText.className = "status-text neutral";
        setStatus("Surf cam needs permission");
        celebrateText.textContent = "Allow webcam access when the browser asks.";
      }
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "h") {
        triggerCheat("high");
        if (audioContext && audioContext.state === "suspended") audioContext.resume();
      }
      if (key === "l") {
        triggerCheat("low");
        if (audioContext && audioContext.state === "suspended") audioContext.resume();
      }
    });

    drawCameraFrame();
    applyTone("neutral", null, false);
  </script>
</body>
</html>
