<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webcam Debugging Portal 🎥</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        #box {
            width: 480px;
            height: 360px;
            border: 4px solid #6ebca7;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            transform: scaleX(-1); /* Mirrors the stream natively */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #log {
            margin-top: 20px;
            width: 480px;
            background: #333;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            border-left: 5px solid #ffb4b4;
        }
    </style>
</head>
<body>

    <h2>Camera Connection Diagnostic Tool</h2>
    
    <div id="box">
        <video id="test-webcam" autoplay playsinline muted></video>
    </div>

    <div id="log">Status: Initializing connection test...</div>

    <script>
        const video = document.getElementById('test-webcam');
        const log = document.getElementById('log');

        function updateLog(msg, isError = false) {
            log.innerText = "Status: " + msg;
            log.style.borderLeftColor = isError ? "#ff7b7b" : "#6ebca7";
        }

        // Standard web browser request loop
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: 480, height: 360 } 
            })
            .then(function(stream) {
                updateLog("Hardware connected! Streaming live frames straight to player...");
                video.srcObject = stream;
                
                // Extra security handshake override for local files
                video.onloadedmetadata = function() {
                    video.play().catch(function(e) {
                        updateLog("Browser blocked auto-play policy: " + e.message, true);
                    });
                };
            })
            .catch(function(error) {
                console.error(error);
                updateLog("Hardware connection failed. Error Name: " + error.name + " | Message: " + error.message, true);
            });
        } else {
            updateLog("Your browser version does not support camera API requests.", true);
        }
    </script>
</body>
</html>
